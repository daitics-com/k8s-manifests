apiVersion: v1
kind: ConfigMap
metadata:
  name: p5-dag-compiler-config
data:
  # Server
  SERVER_PORT: "50002"
  SPRING_PROFILES_ACTIVE: "prod"

  # Database (external PostgreSQL)
  DB_HOST: "192.168.100.15"
  DB_PORT: "5432"
  DB_NAME: "daitics"
  DB_USER: "daitics_app"

  # Keycloak — JWT Validation (internal cluster DNS for production)
  KEYCLOAK_ISSUER_URI: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local:8080/realms/daitics-prod"
  KEYCLOAK_JWK_SET_URI: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local:8080/realms/daitics-prod/protocol/openid-connect/certs"

  # Keycloak — Admin API
  KEYCLOAK_SERVER_URL: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local:8080"
  KEYCLOAK_REALM: "daitics-prod"
  KEYCLOAK_ADMIN_USERNAME: "admin"

  # Temporal
  TEMPORAL_SERVER_URL: "temporal-frontend.temporal-system:7233"

  # Flink
  FLINK_JOBMANAGER_URL: "http://daitics-flink-session-rest.flink:8081"

  # Compiler
  COMPILER_OUTPUT_DIR: "/opt/flink-jobs"

  # Maven runtime configuration for pipeline JAR compilation
  # K8s cluster can't reach Maven Central via Tailscale DNS, so use offline mode.
  # Docker image pre-warms ~/.m2/repository with Flink + Kafka + JDBC + plugins.
  # Future: switch to GitLab Maven proxy by setting COMPILER_MAVEN_SETTINGS instead.
  COMPILER_MAVEN_OFFLINE: "true"

  # JAR Storage — MinIO
  STORAGE_TYPE: "minio"
  MINIO_ENDPOINT: "http://minio.minio-system:9000"
  MINIO_BUCKET: "flink-jars"
  MINIO_REGION: "us-east-1"

  # OpenTelemetry (disabled by default)
  OTEL_SERVICE_NAME: "p5-dag-compiler"
  OTEL_TRACES_EXPORTER: "none"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"

  # Swagger
  SWAGGER_SERVER_URL: "https://p5-dag-compiler.service.daitics.local"
  SWAGGER_SERVER_DESCRIPTION: "Production server"
