# ExternalSecret: Pulls DB credentials from Vault → creates K8s Secret "backend-db-secrets"
# Shared across all backend services (same database, same user)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-db-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backend-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/data/apps/backend/database
        property: db_password
---
# ExternalSecret: Pulls Keycloak admin credentials from Vault → creates K8s Secret "backend-keycloak-secrets"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-keycloak-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backend-keycloak-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: secret/data/apps/backend/keycloak
        property: admin_password
