apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtx-portal
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: dtx-portal
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
